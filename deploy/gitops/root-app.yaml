# App-of-apps: point Argo CD at this directory (`deploy/gitops/apps`).
# Bootstrap applies this single `Application` once; Argo then manages the child Applications.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/michaelj43/kubernetes-mono-app.git
    targetRevision: main
    path: deploy/gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
