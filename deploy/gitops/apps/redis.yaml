apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 20.6.3
    helm:
      releaseName: redis
      values: |
        # Avoid Docker Hub pulls (anonymous rate limits → ImagePullBackOff). Bitnami mirrors on ECR Public.
        # Charts ≥ security gate require explicit opt-in when registry ≠ docker.io (see bitnami/charts#30850).
        global:
          imageRegistry: public.ecr.aws
          security:
            allowInsecureImages: true
        architecture: standalone
        auth:
          enabled: false
        master:
          persistence:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
