apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  ignoreDifferences:
    # CloudNativePG continuously updates status (and related metadata); Git never matches → perpetual OutOfSync.
    - group: postgresql.cnpg.io
      kind: Cluster
      jsonPointers:
        - /status
  source:
    repoURL: https://github.com/michaelj43/kubernetes-mono-app.git
    targetRevision: main
    path: deploy/base/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
