apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: portfolio-db
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
    storageClassName: portfolio-gp3
  bootstrap:
    initdb:
      database: app
      owner: app
