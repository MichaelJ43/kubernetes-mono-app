apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    app.kubernetes.io/name: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
    spec:
      serviceAccountName: portal
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: portal
          image: ghcr.io/michaelj43/kubernetes-mono-app/portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PUBLIC_API_BASE
              value: https://api.k8s.michaelj43.dev
            - name: HTTP_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
