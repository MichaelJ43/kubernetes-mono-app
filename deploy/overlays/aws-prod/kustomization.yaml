# Optional overlay for prod-only Kustomize patches (e.g. extra labels).
# Default Ingress in base/api uses ALB certificate discovery — no ACM ARN in Git.
#
#   kubectl kustomize deploy/overlays/aws-prod | kubectl apply -f -

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: portfolio

resources:
  - ../../base/api
