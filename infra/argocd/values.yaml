global:
  domain: argo.k8s.michaelj43.dev

configs:
  params:
    # TLS terminates on the ALB; ACM discovery matches global.domain (see docs/aws-domain-tls.md).
    server.insecure: true
    # External URL so the UI / redirects match the hostname (not localhost).
    server.url: https://argo.k8s.michaelj43.dev

server:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    controller: aws
    ingressClassName: alb
    # tls: true adds secretName argocd-server-tls (passthrough-style); that secret is not created when
    # server.insecure is true — Ingress/ALB reconciliation breaks. Use extraTls hosts-only like API Ingress.
    tls: false
    extraTls:
      - hosts:
          - argo.k8s.michaelj43.dev
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/backend-protocol: HTTP
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}, {"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/healthcheck-path: /healthz
    aws:
      serviceType: ClusterIP
      backendProtocolVersion: GRPC

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

# Avoid the chart's redis-secret-init Helm hook. In CI that hook repeatedly
# timed out; workflows create argocd-redis/auth before Helm runs instead.
redisSecretInit:
  enabled: false

dex:
  enabled: false

# This repo uses plain Application resources (app-of-apps), not ApplicationSets
# or notifications. Keep the footprint small for a single modest node (default t3.medium).
applicationSet:
  replicas: 0

notifications:
  enabled: false
