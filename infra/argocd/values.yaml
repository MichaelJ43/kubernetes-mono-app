server:
  service:
    type: ClusterIP
  ingress:
    enabled: false

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

# Avoid the chart's redis-secret-init Helm hook. In CI that hook repeatedly
# timed out; workflows create argocd-redis/auth before Helm runs instead.
redisSecretInit:
  enabled: false

dex:
  enabled: false
