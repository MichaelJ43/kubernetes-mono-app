server:
  service:
    type: ClusterIP
  ingress:
    enabled: false

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

# Avoid the chart's redis-secret-init Helm hook. In CI that hook repeatedly
# timed out; workflows create argocd-redis/auth before Helm runs instead.
redisSecretInit:
  enabled: false

dex:
  enabled: false

# This repo uses plain Application resources (app-of-apps), not ApplicationSets
# or notifications. Keep the footprint small for a single modest node (default t3.medium).
applicationSet:
  replicas: 0

notifications:
  enabled: false
