name: Terraform destroy

# Destroys k8s_platform first (Helm uninstall), then foundation (VPC/EKS).
# Type DELETE in confirm field.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DELETE to destroy (destructive)
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-destroy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  destroy:
    if: github.event.inputs.confirm == 'DELETE'
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ vars.TF_STATE_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Destroy k8s_platform
        working-directory: infra/aws/k8s_platform
        env:
          TF_VAR_aws_region: ${{ vars.TF_STATE_REGION }}
          TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ vars.TF_STATE_REGION }}
          TF_VAR_lock_table: ${{ vars.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ vars.TF_FOUNDATION_STATE_KEY }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_K8S_PLATFORM_STATE_KEY }}" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform destroy -input=false -auto-approve

      - name: Destroy foundation
        working-directory: infra/aws/foundation
        env:
          TF_VAR_github_organization: ${{ github.repository_owner }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_aws_region: ${{ vars.TF_STATE_REGION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_FOUNDATION_STATE_KEY }}" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform destroy -input=false -auto-approve
