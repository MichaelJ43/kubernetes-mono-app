name: Soft destroy (park cluster)

# Brings up / refreshes the parked S3 + CloudFront site, uploads static mocks, cuts Route53 to
# CloudFront (when **TF_ROUTE53_HOSTED_ZONE_ID** is set), then destroys **k8s_platform** and **foundation**.
# GitHub deploy IAM remains in **github_deploy** state so Actions keep working.
# **workflow_dispatch** has no inputs: region from **TF_STATE_REGION** (fallback **us-east-1**), cluster from **EKS_CLUSTER_NAME** (fallback **k8s-mono**).

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: soft-destroy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  soft-destroy:
    environment: deploy
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_FOUNDATION: ${{ github.event.repository.name }}/foundation/terraform.tfstate
      STATE_KEY_K8S_PLATFORM: ${{ github.event.repository.name }}/k8s-platform/terraform.tfstate
      STATE_KEY_PARKED: ${{ github.event.repository.name }}/parked-site/terraform.tfstate
      STATE_KEY_GITHUB_DEPLOY: ${{ github.event.repository.name }}/github-deploy/terraform.tfstate
      AWS_REGION: ${{ secrets.TF_STATE_REGION || 'us-east-1' }}
      CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'k8s-mono' }}
    steps:
      - uses: actions/checkout@v4

      - name: Require secrets
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          err=0
          if [ -z "$ARN" ]; then echo "::error::AWS_DEPLOY_ROLE_ARN is not set."; err=1; fi
          if [ -z "${BUCKET}" ]; then echo "::error::TF_STATE_BUCKET is not set."; err=1; fi
          if [ -z "${LOCK_TABLE}" ]; then echo "::error::TF_LOCK_TABLE is not set."; err=1; fi
          exit "$err"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform apply (parked_site, DNS off)
        working-directory: infra/aws/parked_site
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
          TF_VAR_parked_aliases: '["k8s.michaelj43.dev","api.k8s.michaelj43.dev"]'
          TF_VAR_route53_zone_id: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
          TF_VAR_manage_route53_records: "false"
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_PARKED }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform apply -input=false -auto-approve

      - name: Upload static site
        working-directory: infra/aws/parked_site
        run: |
          set -euo pipefail
          BUCKET=$(terraform output -raw s3_bucket_id)
          ROOT="${GITHUB_WORKSPACE}/static/cluster-offline"
          aws s3 rm "s3://${BUCKET}/" --recursive || true
          find "$ROOT" -type f | while IFS= read -r f; do
            rel="${f#$ROOT/}"
            case "$f" in
              *.json) ct="application/json" ;;
              *.html) ct="text/html; charset=utf-8" ;;
              *) ct="application/octet-stream" ;;
            esac
            aws s3 cp "$f" "s3://${BUCKET}/${rel}" --content-type "$ct" --cache-control "max-age=60"
          done

      - name: Invalidate CloudFront
        working-directory: infra/aws/parked_site
        run: |
          CID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id "${CID}" --paths "/*"

      - name: Install kubectl & helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: kubeconfig
        run: aws eks update-kubeconfig --name "${{ env.CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Delete Argo root app and Helm
        run: |
          kubectl delete -f deploy/gitops/root-app.yaml --ignore-not-found
          helm uninstall argocd -n argocd --wait || true

      - name: Delete portfolio Ingresses (release ExternalDNS names)
        run: |
          kubectl delete ingress api portal -n portfolio --ignore-not-found
          kubectl delete ingress argocd-server -n argocd --ignore-not-found || true

      - name: Wait for ExternalDNS / Route53
        run: sleep 120

      - name: Terraform apply (parked_site, Route53 on)
        working-directory: infra/aws/parked_site
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
          TF_VAR_parked_aliases: '["k8s.michaelj43.dev","api.k8s.michaelj43.dev"]'
          TF_VAR_route53_zone_id: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
          ROUTE53_ZONE: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ROUTE53_ZONE:-}" ]; then
            echo "::warning::TF_ROUTE53_HOSTED_ZONE_ID unset — point DNS at CloudFront manually."
            exit 0
          fi
          export TF_VAR_manage_route53_records=true
          terraform apply -input=false -auto-approve

      - name: Destroy k8s_platform
        working-directory: infra/aws/k8s_platform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ env.AWS_REGION }}
          TF_VAR_lock_table: ${{ secrets.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ env.STATE_KEY_FOUNDATION }}
          TF_VAR_external_dns_route53_zone_id: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_K8S_PLATFORM }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform destroy -input=false -auto-approve

      - name: Destroy foundation
        working-directory: infra/aws/foundation
        env:
          TF_VAR_github_organization: ${{ github.repository_owner }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_github_actions_deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ env.AWS_REGION }}
          TF_VAR_lock_table: ${{ secrets.TF_LOCK_TABLE }}
          TF_VAR_github_deploy_state_key: ${{ env.STATE_KEY_GITHUB_DEPLOY }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_FOUNDATION }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform destroy -input=false -auto-approve

      - name: Set SSM site mode to static (for deploy-main routing)
        if: success()
        run: |
          aws ssm put-parameter \
            --name "/kubernetes-mono-app/site_mode" \
            --value "static" \
            --type String \
            --overwrite
