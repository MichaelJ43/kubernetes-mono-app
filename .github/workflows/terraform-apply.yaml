name: Terraform apply

# Applies foundation then k8s_platform (Helm: AWS Load Balancer Controller), then bootstraps Argo CD.
# Requires: S3 bucket + DynamoDB lock (secrets TF_STATE_BUCKET, TF_LOCK_TABLE; optional TF_STATE_REGION);
#           state keys are <repo>/foundation/... and <repo>/k8s-platform/... from github.event.repository.name.
#           IAM role in secret AWS_DEPLOY_ROLE_ARN (same secret as Argo bootstrap/teardown).
#
# Runs automatically on push to main only when Terraform / this workflow changes; app deploys stay in GitOps (Argo).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type APPLY to run
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - "infra/aws/**"
      - ".github/workflows/terraform-apply.yaml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.repository }}
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'APPLY') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: deploy
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_FOUNDATION: ${{ github.event.repository.name }}/foundation/terraform.tfstate
      STATE_KEY_K8S_PLATFORM: ${{ github.event.repository.name }}/k8s-platform/terraform.tfstate
      AWS_REGION: ${{ secrets.TF_STATE_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Require AWS deploy role and Terraform backend variables
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          err=0
          if [ -z "$ARN" ]; then echo "::error::AWS_DEPLOY_ROLE_ARN is not set."; err=1; fi
          if [ -z "${BUCKET}" ]; then echo "::error::TF_STATE_BUCKET is not set."; err=1; fi
          if [ -z "${LOCK_TABLE}" ]; then echo "::error::TF_LOCK_TABLE is not set."; err=1; fi
          exit "$err"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Init & apply foundation
        working-directory: infra/aws/foundation
        env:
          TF_VAR_github_organization: ${{ github.repository_owner }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_github_actions_deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_FOUNDATION }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform apply -input=false -auto-approve

      - name: Init & apply k8s_platform
        working-directory: infra/aws/k8s_platform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ env.AWS_REGION }}
          TF_VAR_lock_table: ${{ secrets.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ env.STATE_KEY_FOUNDATION }}
          TF_VAR_external_dns_route53_zone_id: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_K8S_PLATFORM }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform apply -input=false -auto-approve

      - name: Read foundation outputs
        id: foundation-outputs
        working-directory: infra/aws/foundation
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Install Argo CD bootstrap tools
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.foundation-outputs.outputs.cluster_name }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Prepare Argo CD Helm (repo + clear stuck hook Jobs)
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm || true
          helm repo update
          # The chart's redis-secret-init Job is a pre-install/pre-upgrade Helm hook. A failed CI run can
          # leave it incomplete; the next upgrade then waits on that hook until Helm times out.
          if kubectl get ns argocd >/dev/null 2>&1; then
            jobs=$(kubectl -n argocd get jobs -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
            for j in ${jobs:-}; do
              case "$j" in
                *redis*secret*init*) kubectl -n argocd delete job "$j" --ignore-not-found ;;
              esac
            done
            kubectl -n argocd delete pods -l app.kubernetes.io/component=redis-secret-init --ignore-not-found || true
          fi

      - name: Ensure Argo CD Redis secret
        run: |
          set -euo pipefail
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          if ! kubectl -n argocd get secret argocd-redis >/dev/null 2>&1; then
            kubectl -n argocd create secret generic argocd-redis \
              --from-literal=auth="$(openssl rand -base64 32)"
          fi

      - name: Install or upgrade Argo CD
        run: |
          set -euo pipefail
          helm upgrade --install argocd argo/argo-cd \
            --version 9.5.11 \
            --namespace argocd \
            --create-namespace \
            --wait \
            --timeout 30m \
            -f infra/argocd/values.yaml

      - name: Argo CD Helm diagnostics
        if: failure()
        run: |
          kubectl get ns argocd || true
          kubectl -n argocd get deploy,sts,ds,svc,jobs,pods,events --sort-by='.lastTimestamp' 2>/dev/null | tail -120 || true
          helm status argocd -n argocd 2>/dev/null || true

      - name: Apply root app-of-apps
        run: kubectl apply -f deploy/gitops/root-app.yaml
