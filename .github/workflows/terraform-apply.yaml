name: Terraform apply

# Applies foundation then k8s_platform (Helm: AWS Load Balancer Controller).
# Requires: S3 bucket + DynamoDB lock (TF_STATE_BUCKET, TF_STATE_REGION, TF_LOCK_TABLE);
#           state keys are <repo>/foundation/... and <repo>/k8s-platform/... from github.event.repository.name.
#           IAM role in secret AWS_DEPLOY_ROLE_ARN (same secret as Argo bootstrap/teardown).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type APPLY to run
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.repository }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.inputs.confirm == 'APPLY'
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_FOUNDATION: ${{ github.event.repository.name }}/foundation/terraform.tfstate
      STATE_KEY_K8S_PLATFORM: ${{ github.event.repository.name }}/k8s-platform/terraform.tfstate
      AWS_REGION: ${{ vars.TF_STATE_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Init & apply foundation
        working-directory: infra/aws/foundation
        env:
          TF_VAR_github_organization: ${{ github.repository_owner }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_FOUNDATION }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform apply -input=false -auto-approve

      - name: Init & apply k8s_platform
        working-directory: infra/aws/k8s_platform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ env.AWS_REGION }}
          TF_VAR_lock_table: ${{ vars.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ env.STATE_KEY_FOUNDATION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_K8S_PLATFORM }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform apply -input=false -auto-approve
