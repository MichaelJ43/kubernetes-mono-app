name: Terraform plan

# Optional AWS plan on PR (same-repo only; needs AWS_ROLE_ARN_TERRAFORM + IAM trust for PRs).
# Always runs fmt/validate without credentials.

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/aws/**'
      - '.github/workflows/terraform-plan.yaml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.repository }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/aws/foundation infra/aws/k8s_platform
      - name: Terraform validate (foundation)
        working-directory: infra/aws/foundation
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: Terraform validate (k8s_platform)
        working-directory: infra/aws/k8s_platform
        run: |
          terraform init -backend=false -input=false
          terraform validate

  foundation:
    needs: [validate]
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_FOUNDATION: ${{ github.event.repository.name }}/foundation/terraform.tfstate
      AWS_REGION: ${{ vars.TF_STATE_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Terraform OIDC role secret
        env:
          ARN: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
        run: |
          if [ -z "$ARN" ]; then
            echo "::error::Repository secret AWS_ROLE_ARN_TERRAFORM is not set. After infra/aws/foundation apply, set it to output github_actions_terraform_role_arn (docs/github-actions.md)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform init (foundation)
        working-directory: infra/aws/foundation
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_FOUNDATION }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan (foundation)
        id: plan-foundation
        working-directory: infra/aws/foundation
        env:
          TF_VAR_github_organization: ${{ github.repository_owner }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform plan -input=false -no-color

  k8s_platform:
    runs-on: ubuntu-latest
    needs: [foundation]
    if: github.event.pull_request.head.repo.fork == false
    continue-on-error: true
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_FOUNDATION: ${{ github.event.repository.name }}/foundation/terraform.tfstate
      STATE_KEY_K8S_PLATFORM: ${{ github.event.repository.name }}/k8s-platform/terraform.tfstate
      AWS_REGION: ${{ vars.TF_STATE_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Terraform OIDC role secret
        env:
          ARN: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
        run: |
          if [ -z "$ARN" ]; then
            echo "::error::AWS_ROLE_ARN_TERRAFORM is not set."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform init (k8s_platform)
        working-directory: infra/aws/k8s_platform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_K8S_PLATFORM }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan (k8s_platform)
        working-directory: infra/aws/k8s_platform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ env.AWS_REGION }}
          TF_VAR_lock_table: ${{ vars.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ env.STATE_KEY_FOUNDATION }}
        run: terraform plan -input=false -no-color
