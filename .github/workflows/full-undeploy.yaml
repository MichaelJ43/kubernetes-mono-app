name: Full undeploy

# Best-effort stack teardown: optional Argo CD / root Application cleanup, then Terraform
# destroy (k8s_platform → foundation). Use skip_argo if the cluster is already gone.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type FULL UNDEPLOY to run (destructive)
        required: true
        type: string
      cluster_name:
        description: EKS cluster name (must match foundation; for kubeconfig / Argo steps)
        required: true
        type: string
      aws_region:
        description: AWS region of the cluster and Terraform state backend
        required: true
        default: us-east-1
        type: string
      skip_argo:
        description: Skip kubectl/Helm (use if cluster API is already unreachable)
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: full-undeploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  undeploy:
    if: github.event.inputs.confirm == 'FULL UNDEPLOY'
    environment: deploy
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_FOUNDATION: ${{ github.event.repository.name }}/foundation/terraform.tfstate
      STATE_KEY_K8S_PLATFORM: ${{ github.event.repository.name }}/k8s-platform/terraform.tfstate
      # S3 state backend region (often matches TF_STATE_REGION secret); cluster ops use inputs.aws_region
      TF_BACKEND_REGION: ${{ secrets.TF_STATE_REGION || github.event.inputs.aws_region }}
    steps:
      - uses: actions/checkout@v4

      - name: Require AWS deploy role and Terraform backend variables
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          err=0
          if [ -z "$ARN" ]; then echo "::error::AWS_DEPLOY_ROLE_ARN is not set."; err=1; fi
          if [ -z "${BUCKET}" ]; then echo "::error::TF_STATE_BUCKET is not set."; err=1; fi
          if [ -z "${LOCK_TABLE}" ]; then echo "::error::TF_LOCK_TABLE is not set."; err=1; fi
          exit "$err"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install kubectl & helm (Argo cleanup)
        if: ${{ !inputs.skip_argo }}
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: kubeconfig
        if: ${{ !inputs.skip_argo }}
        run: aws eks update-kubeconfig --name "${{ inputs.cluster_name }}" --region "${{ inputs.aws_region }}"

      - name: Delete root Application (app-of-apps)
        if: ${{ !inputs.skip_argo }}
        run: kubectl delete -f deploy/gitops/root-app.yaml --ignore-not-found

      - name: Uninstall Argo CD
        if: ${{ !inputs.skip_argo }}
        run: helm uninstall argocd -n argocd --wait || true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Destroy k8s_platform (Helm / AWS LB controller)
        working-directory: infra/aws/k8s_platform
        env:
          TF_VAR_aws_region: ${{ inputs.aws_region }}
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ inputs.aws_region }}
          TF_VAR_lock_table: ${{ secrets.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ env.STATE_KEY_FOUNDATION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_K8S_PLATFORM }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform destroy -input=false -auto-approve

      - name: Destroy foundation (VPC / EKS)
        working-directory: infra/aws/foundation
        env:
          TF_VAR_github_organization: ${{ github.repository_owner }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_aws_region: ${{ inputs.aws_region }}
          TF_VAR_github_actions_deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_FOUNDATION }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform destroy -input=false -auto-approve
