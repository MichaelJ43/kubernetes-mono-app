name: Deploy main

# On push to **main** or **workflow_dispatch** (no inputs): reads SSM **`/kubernetes-mono-app/site_mode`** (`cluster` | `static`, default **cluster**).
# - **cluster** + infra paths changed → reusable **Terraform apply** (EKS infra + Argo bootstrap).
# - **static** + static paths changed → reusable **Static site deploy** (S3/CloudFront).
# Manual dispatch treats both path filters as **true** so you can redeploy without a diff on **main**.
# Application manifest changes are picked up by **Argo CD** from Git (no extra job here).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  site_mode:
    environment: deploy
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.ssm.outputs.mode }}
    steps:
      - name: Require AWS deploy role
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$ARN" ]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN is not set."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.TF_STATE_REGION || 'us-east-1' }}

      - name: Read site mode from SSM
        id: ssm
        run: |
          set -euo pipefail
          REGION="${{ secrets.TF_STATE_REGION || 'us-east-1' }}"
          export AWS_DEFAULT_REGION="$REGION"
          RAW=$(aws ssm get-parameter --name "/kubernetes-mono-app/site_mode" --query "Parameter.Value" --output text 2>/dev/null || true)
          RAW=${RAW:-cluster}
          case "$RAW" in
            static|cluster) MODE="$RAW" ;;
            *) MODE="cluster" ;;
          esac
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Resolved site_mode=${MODE} (SSM raw was '${RAW:-<unset>}')"

  paths:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.flags.outputs.infra }}
      static: ${{ steps.flags.outputs.static }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          base: ${{ github.event.before }}
          filters: |
            infra:
              - 'infra/aws/**'
              - '.github/workflows/terraform-apply.yaml'
              - '.github/workflows/deploy-main.yaml'
            static:
              - 'static/cluster-offline/**'
              - 'infra/aws/parked_site/**'
              - '.github/workflows/static-site-deploy.yaml'
      - name: Path flags (push vs manual)
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
            echo "static=true" >> "$GITHUB_OUTPUT"
          else
            echo "infra=${{ steps.filter.outputs.infra }}" >> "$GITHUB_OUTPUT"
            echo "static=${{ steps.filter.outputs.static }}" >> "$GITHUB_OUTPUT"
          fi

  cluster-terraform:
    needs: [site_mode, paths]
    if: needs.site_mode.outputs.mode == 'cluster' && needs.paths.outputs.infra == 'true'
    uses: ./.github/workflows/terraform-apply.yaml
    secrets: inherit
    with:
      called_from_deploy_main: true

  static-site:
    needs: [site_mode, paths]
    if: needs.site_mode.outputs.mode == 'static' && needs.paths.outputs.static == 'true'
    uses: ./.github/workflows/static-site-deploy.yaml
    secrets: inherit
