name: Argo CD bootstrap

# Installs Argo CD into the current kubectl context and applies the root Application.
# Requires AWS OIDC + IAM role with EKS access (see docs/runbooks/bootstrap.md).

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: EKS cluster name
        required: true
        type: string
      aws_region:
        description: AWS region of the cluster
        required: true
        default: us-east-1
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    environment: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require AWS deploy role secret
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$ARN" ]; then
            echo "::error::Repository secret AWS_DEPLOY_ROLE_ARN is not set. See docs/github-actions.md."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install tools
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: kubeconfig
        run: |
          aws eks update-kubeconfig --name "${{ inputs.cluster_name }}" --region "${{ inputs.aws_region }}"

      - name: Prepare Argo CD Helm (repo + clear stuck hook Jobs)
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm || true
          helm repo update
          if kubectl get ns argocd >/dev/null 2>&1; then
            jobs=$(kubectl -n argocd get jobs -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
            for j in ${jobs:-}; do
              case "$j" in
                *redis*secret*init*) kubectl -n argocd delete job "$j" --ignore-not-found ;;
              esac
            done
            kubectl -n argocd delete pods -l app.kubernetes.io/component=redis-secret-init --ignore-not-found || true
          fi

      - name: Install Argo CD
        run: |
          set -euo pipefail
          helm upgrade --install argocd argo/argo-cd \
            --version 9.5.11 \
            --namespace argocd \
            --create-namespace \
            --wait \
            --timeout 30m \
            -f infra/argocd/values.yaml

      - name: Argo CD Helm diagnostics
        if: failure()
        run: |
          kubectl get ns argocd || true
          kubectl -n argocd get deploy,sts,ds,svc,jobs,pods,events --sort-by='.lastTimestamp' 2>/dev/null | tail -120 || true
          helm status argocd -n argocd 2>/dev/null || true

      - name: Apply root app-of-apps
        run: kubectl apply -f deploy/gitops/root-app.yaml

      - name: Hint
        run: |
          echo "Get initial admin secret: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
          echo "Port-forward UI: kubectl -n argocd port-forward svc/argocd-server 8080:443"
