name: Deploy AWS (bundle + orchestrator)

# After **CI** succeeds on **main** (push): build/push images, render Kustomize into a tarball, upload to the
# deploy **source** S3 bucket, **terraform apply** `deploy_orchestrator` (if needed), then **POST /deploy**
# and poll the DynamoDB job row. Manual **workflow_dispatch** runs the same path.
#
# **Static-only (no EKS):** set repository variable **`DEPLOY_ORCHESTRATOR_EKS`** to **`false`** so
# **`TF_VAR_enable_eks_integration=false`** (no foundation remote state / cluster required). Keep SSM **`site_mode=static`**.

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: deploy-aws-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment: deploy
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      STATE_KEY_ORCHESTRATOR: ${{ github.event.repository.name }}/deploy-orchestrator/terraform.tfstate
      AWS_REGION: ${{ secrets.TF_STATE_REGION || 'us-east-1' }}
      CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'k8s-mono' }}
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      # When `false` or `0`, orchestrator skips EKS (parked/static deploys only). Unset = EKS on (default).
      TF_VAR_enable_eks_integration: ${{ vars.DEPLOY_ORCHESTRATOR_EKS != 'false' && vars.DEPLOY_ORCHESTRATOR_EKS != '0' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require AWS deploy role and Terraform backend secrets
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          LOCK: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          err=0
          if [ -z "$ARN" ]; then echo "::error::AWS_DEPLOY_ROLE_ARN is not set."; err=1; fi
          if [ -z "$BUCKET" ]; then echo "::error::TF_STATE_BUCKET is not set."; err=1; fi
          if [ -z "$LOCK" ]; then echo "::error::TF_LOCK_TABLE is not set."; err=1; fi
          exit "$err"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: docker/setup-buildx-action@v3
      - name: GHCR image path (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.ghcr.outputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API and portal images
        env:
          OWNER: ${{ steps.ghcr.outputs.owner }}
          SHA: ${{ env.DEPLOY_SHA }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/${OWNER}/kubernetes-mono-app"
          docker buildx build --push -t "${IMG}/api:${SHA}" -t "${IMG}/api:latest" apps/api
          docker buildx build --push -t "${IMG}/portal:${SHA}" -t "${IMG}/portal:latest" apps/portal

      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: 5.4.3
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | sudo tar xzf - -C /usr/local/bin

      - name: Build release bundle
        env:
          OWNER: ${{ steps.ghcr.outputs.owner }}
          SHA: ${{ env.DEPLOY_SHA }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/${OWNER}/kubernetes-mono-app"
          (cd deploy/base/api && kustomize edit set image "${IMG}/api=${IMG}/api:${SHA}")
          (cd deploy/base/portal && kustomize edit set image "${IMG}/portal=${IMG}/portal:${SHA}")
          STAGE="${RUNNER_TEMP}/bundle"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/k8s"
          kustomize build deploy/base/api > "$STAGE/k8s/api.yaml"
          kustomize build deploy/base/portal > "$STAGE/k8s/portal.yaml"
          cp -R static/cluster-offline "$STAGE/static"
          printf '{"sha":"%s","repository":"%s"}\n' "$SHA" "${{ github.repository }}" > "$STAGE/manifest.json"
          tar -czf "${RUNNER_TEMP}/bundle.tar.gz" -C "$STAGE" k8s static manifest.json

      - name: Build Lambda deployment package
        run: infra/aws/deploy_orchestrator/lambda/build.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform apply (deploy_orchestrator)
        working-directory: infra/aws/deploy_orchestrator
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_github_repository: ${{ github.event.repository.name }}
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_state_region: ${{ env.AWS_REGION }}
          TF_VAR_lock_table: ${{ secrets.TF_LOCK_TABLE }}
          TF_VAR_foundation_state_key: ${{ github.event.repository.name }}/foundation/terraform.tfstate
          TF_VAR_parked_site_state_key: ${{ github.event.repository.name }}/parked-site/terraform.tfstate
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY_ORCHESTRATOR }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          terraform apply -input=false -auto-approve

      - name: Upload bundle and invoke deploy
        env:
          SHA: ${{ env.DEPLOY_SHA }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET=$(terraform -chdir=infra/aws/deploy_orchestrator output -raw source_bucket_id)
          KEY="bundles/${SHA}.tar.gz"
          aws s3 cp "${RUNNER_TEMP}/bundle.tar.gz" "s3://${BUCKET}/${KEY}"
          API_BASE=$(aws ssm get-parameter --name /kubernetes-mono-app/deploy_orchestrator_api_url --query Parameter.Value --output text)
          RESP=$(curl -sS -X POST "${API_BASE}/deploy" \
            -H "Content-Type: application/json" \
            -d "{\"bundle_key\":\"${KEY}\"}")
          echo "$RESP"
          JOB_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          TABLE=$(terraform -chdir=infra/aws/deploy_orchestrator output -raw jobs_table_name)
          for i in $(seq 1 120); do
            ST=$(aws dynamodb get-item --table-name "$TABLE" --key "{\"job_id\":{\"S\":\"${JOB_ID}\"}}" \
              --query 'Item.status.S' --output text 2>/dev/null || echo "")
            if [ "$ST" = "succeeded" ]; then
              echo "Deploy job succeeded."
              exit 0
            fi
            if [ "$ST" = "failed" ]; then
              DET=$(aws dynamodb get-item --table-name "$TABLE" --key "{\"job_id\":{\"S\":\"${JOB_ID}\"}}" \
                --query 'Item.detail.S' --output text)
              echo "::error::Deploy job failed: ${DET}"
              exit 1
            fi
            sleep 5
          done
          echo "::error::Timed out waiting for deploy job"
          exit 1
