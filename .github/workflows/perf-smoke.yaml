name: Performance smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of the API (e.g. https://api.k8s.michaelj43.dev)
        required: true
        type: string
        default: http://127.0.0.1:8080

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6
        run: |
          docker run --rm \
            -e BASE_URL="${{ inputs.base_url }}" \
            -v "$PWD:/work" -w /work \
            grafana/k6:latest run tests/perf/load.js
