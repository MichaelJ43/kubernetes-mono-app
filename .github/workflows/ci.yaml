name: CI

# Tests on push/PR. After CI succeeds on **main**, **deploy-aws** builds images, uploads a bundle, and invokes the deploy orchestrator (see **docs/github-actions.md**).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    environment: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
      - name: Test
        run: |
          go test ./...
          go vet ./...

  portal-test:
    environment: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/portal/go.mod
      - name: Test portal
        run: |
          go mod tidy
          go test ./...
          go vet ./...
