openapi: 3.0.3
info:
  title: kubernetes-mono-app API
  version: 1.0.0
  description: Portfolio API (health, items, Redis cache demo).
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Liveness
      responses:
        '200':
          description: OK
  /ready:
    get:
      summary: Readiness
      responses:
        '200':
          description: Ready
        '503':
          description: Dependency unavailable
  /version:
    get:
      summary: Build version
      responses:
        '200':
          description: Version JSON
  /items:
    get:
      summary: List items from PostgreSQL
      responses:
        '200':
          description: OK
  /cache-demo:
    get:
      summary: Cache-through Redis demo
      responses:
        '200':
          description: OK
  /v1/sample-protected:
    get:
      summary: Demo route gated by shared-api-platform session
      description: |
        Forwards the browser Cookie header to GET https://api.michaelj43.dev/v1/auth/me.
        Returns 401 without a valid sap_session. Credentialed CORS allowed for michaelj43.dev apex hosts.
      responses:
        '200':
          description: JSON includes user from shared auth
        '401':
          description: No or invalid session
        '502':
          description: Auth upstream error or unreachable
    options:
      summary: CORS preflight for sample-protected
      responses:
        '204':
          description: No content
